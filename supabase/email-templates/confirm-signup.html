<!-- Supabase → Authentication → Emails → Templates → "Confirm signup" -->
<!-- Subject: Confirm your Inside STLC Academy account -->
<div style="background:#f4f5f7;padding:24px 0;margin:0">
  <div style="font-family:system-ui,-apple-system,Segoe UI,sans-serif;max-width:560px;margin:0 auto;background:#ffffff;border-radius:12px;overflow:hidden;border:1px solid #e5e7eb">
    <div style="background:#0d1b2a;padding:22px 24px;text-align:center">
      <img src="https://www.insidestlcacademy.com/logo.png" alt="Inside STLC Academy" height="34" style="height:34px;width:auto" />

    <div style="height:3px;background:#e9b949"></div>
    <div style="padding:28px 24px;color:#0d1b2a;font-size:15px;line-height:1.6">
      <h2 style="margin:0 0 12px">Confirm your account</h2>
      <p>Thanks for signing up to Inside STLC Academy. Please confirm your email address to activate your account.</p>

    </div>
    <div style="padding:16px 24px;border-top:1px solid #eee;color:#6b7280;font-size:12px;text-align:center">
